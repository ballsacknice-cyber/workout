<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>Workout</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: #2e2e2e;
  --text: #f0f0f0;
  --text2: #888;
  --text3: #444;
  --accent: #4ade80;
  --accent-dim: #1a3323;
  --accent-border: #2d5a3d;
  --amber: #fbbf24;
  --amber-dim: #2a1f07;
  --amber-border: #5a3d0a;
  --danger: #f87171;
  --danger-dim: #2d1515;
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif; overflow-x: hidden; padding-bottom: 90px; }

/* NAV */
.nav { display: flex; border-bottom: 1px solid var(--border); background: rgba(15,15,15,0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
.nav-btn { flex: 1; padding: 13px 8px 11px; font-size: 12px; font-weight: 600; color: var(--text3); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; letter-spacing: 0.04em; text-transform: uppercase; transition: color 0.15s; }
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* PAGE HEADER */
.page-header { padding: 18px 16px 6px; display: flex; align-items: baseline; justify-content: space-between; }
.page-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
.page-sub { font-size: 13px; color: var(--text2); }

/* PROGRESS */
.progress-wrap { margin: 8px 12px 0; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 12px 14px; }
.progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.progress-label { font-size: 13px; color: var(--text2); }
.progress-pct { font-size: 13px; font-weight: 600; color: var(--accent); }
.progress-track { background: var(--surface2); border-radius: 4px; height: 5px; overflow: hidden; }
.progress-fill { background: var(--accent); height: 100%; border-radius: 4px; transition: width 0.35s ease; }

/* SECTION HEAD */
.section-head { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); padding: 16px 16px 6px; }

/* CARDIO CARD */
.cardio-card { margin: 6px 12px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
.cardio-card.has-segments { border-color: var(--accent-border); }
.cardio-top { display: flex; align-items: center; gap: 12px; padding: 14px 16px; }
.cardio-icon { width: 42px; height: 42px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.cardio-card.has-segments .cardio-icon { background: var(--accent-border); }
.cardio-info { flex: 1; }
.cardio-name { font-size: 15px; font-weight: 600; }
.cardio-detail { font-size: 13px; color: var(--text2); margin-top: 2px; }
.cardio-add-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 14px; font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer; white-space: nowrap; }
.cardio-segments { border-top: 1px solid var(--border); padding: 10px 14px; display: flex; flex-direction: column; gap: 6px; }
.cardio-segment { display: flex; align-items: center; gap: 8px; background: var(--surface2); border-radius: var(--radius-sm); padding: 8px 12px; }
.cardio-segment-info { flex: 1; font-size: 14px; font-weight: 500; }
.cardio-segment-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
.cardio-segment-del { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1; }
.cardio-total { padding: 8px 14px 12px; font-size: 13px; color: var(--accent); font-weight: 600; }
.cardio-inputs { display: flex; gap: 8px; }
.cardio-input-group { flex: 1; }
.cardio-input-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 5px; }
.cardio-sheet-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 10px; font-size: 16px; font-weight: 600; color: var(--text); outline: none; text-align: center; font-family: inherit; }
.cardio-sheet-input:focus { border-color: var(--accent); }

/* EXERCISE CARD */
.ex-card { margin: 6px 12px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; transition: border-color 0.2s; }
.ex-card.all-done { border-color: var(--accent-border); }

.ex-header { display: flex; align-items: center; gap: 10px; padding: 13px 14px; cursor: pointer; user-select: none; }
.ex-title-block { flex: 1; min-width: 0; }
.ex-name { font-size: 15px; font-weight: 600; }
.ex-subtitle { font-size: 12px; color: var(--text2); margin-top: 2px; }
.ex-summary { text-align: right; flex-shrink: 0; }
.ex-weight-label { font-size: 15px; font-weight: 600; }
.ex-sets-summary { font-size: 11px; color: var(--text2); margin-top: 2px; }
.ex-chevron { color: var(--text3); font-size: 20px; line-height: 1; margin-left: 2px; display: inline-block; transition: transform 0.2s; }
.ex-chevron.open { transform: rotate(90deg); }

/* EXPANDED DETAIL */
.ex-detail { display: none; border-top: 1px solid var(--border); }
.ex-detail.open { display: block; }

/* SET CIRCLES */
.sets-area { padding: 14px 14px 10px; }
.sets-row { display: flex; gap: 10px; margin-bottom: 12px; }
.set-circle { flex: 1; aspect-ratio: 1; border-radius: 50%; border: 2px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; background: var(--surface2); min-width: 0; max-width: 72px; }
.set-circle .set-num { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; }
.set-circle .set-reps { font-size: 17px; font-weight: 700; color: var(--text3); }
.set-circle.done { border-color: var(--accent); background: var(--accent-dim); }
.set-circle.done .set-reps { color: var(--accent); }
.set-circle.done .set-num { color: var(--accent); opacity: 0.7; }
.set-circle.failed { border-color: var(--amber); background: var(--amber-dim); }
.set-circle.failed .set-reps { color: var(--amber); }
.set-circle.failed .set-num { color: var(--amber); opacity: 0.7; }
.set-circle.next { border-color: var(--text3); border-style: dashed; }
.set-circle.next .set-reps { color: var(--text3); }

.sets-btn-row { display: flex; gap: 8px; }
.complete-all-btn { flex: 1; background: var(--accent-dim); border: 1px solid var(--accent-border); border-radius: var(--radius-sm); padding: 11px; font-size: 14px; font-weight: 600; color: var(--accent); cursor: pointer; }
.undo-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 14px; font-size: 14px; color: var(--text2); cursor: pointer; }

/* WEIGHT & NOTE ROW */
.ex-bottom { padding: 0 14px 14px; border-top: 1px solid var(--border); }
.ex-bottom-row { display: flex; gap: 8px; padding-top: 12px; }
.log-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 14px; color: var(--text); outline: none; font-family: inherit; }
.log-input:focus { border-color: var(--accent); }
.log-btn { background: var(--accent); color: #000; border: none; border-radius: var(--radius-sm); padding: 10px 16px; font-size: 14px; font-weight: 700; cursor: pointer; }
.note-area { margin-top: 10px; }
.note-label-sm { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
.note-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 14px; color: var(--text); outline: none; resize: none; height: 58px; font-family: inherit; }
.note-input:focus { border-color: var(--accent); }

/* SESSION NOTES */
.session-notes-wrap { margin: 6px 12px; }
.session-notes-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; font-size: 14px; color: var(--text); outline: none; resize: none; height: 70px; font-family: inherit; }
.session-notes-input:focus { border-color: var(--accent); }

/* BOTTOM BUTTONS */
.bottom-btn-row { display: flex; gap: 8px; margin: 12px 12px 0; }
.action-btn { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px; font-size: 14px; font-weight: 600; color: var(--text2); cursor: pointer; }
.action-btn.primary { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
.action-btn.danger { color: var(--danger); border-color: var(--danger-dim); }

/* BOTTOM SHEET */
.sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.sheet-overlay.show { opacity: 1; pointer-events: all; }
.sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-radius: 20px 20px 0 0; z-index: 201; padding: 0 16px 32px; transform: translateY(100%); transition: transform 0.25s cubic-bezier(0.32,0.72,0,1); max-height: 85vh; overflow-y: auto; }
.sheet.show { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 16px; }
.sheet-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; text-align: center; }
.sheet-section { margin-bottom: 16px; }
.sheet-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.sheet-weight-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 18px; font-weight: 600; color: var(--text); outline: none; text-align: center; font-family: inherit; }
.sheet-weight-input:focus { border-color: var(--accent); }
.reps-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.rep-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 8px; font-size: 18px; font-weight: 600; color: var(--text); cursor: pointer; text-align: center; transition: all 0.1s; }
.rep-btn:active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.rep-btn.target { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
.rep-btn.selected { background: var(--accent); border-color: var(--accent); color: #000; }
.sheet-confirm-btn { width: 100%; background: var(--accent); color: #000; border: none; border-radius: var(--radius-sm); padding: 15px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 4px; }

/* HISTORY */
.history-list { padding: 8px 12px; }
.history-item { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px; margin-bottom: 8px; }
.history-date { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 10px; }
.history-note { font-size: 13px; color: var(--text2); font-style: italic; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.history-row { display: flex; justify-content: space-between; align-items: flex-start; font-size: 13px; padding: 4px 0; border-bottom: 1px solid var(--border); gap: 8px; }
.history-row:last-child { border-bottom: none; }
.history-ex-name { color: var(--text2); flex-shrink: 0; }
.history-sets { text-align: right; color: var(--text); font-size: 12px; line-height: 1.5; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 15px; line-height: 1.6; }

/* SETTINGS */
.settings-section { margin: 0 12px 20px; }
.settings-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
.settings-row { display: flex; align-items: center; gap: 12px; padding: 13px 14px; border-bottom: 1px solid var(--border); }
.settings-row:last-child { border-bottom: none; }
.settings-row-info { flex: 1; }
.settings-row-label { font-size: 15px; }
.settings-row-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.settings-input { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 15px; font-weight: 600; color: var(--text); outline: none; width: 90px; text-align: center; font-family: inherit; }
.settings-input:focus { border-color: var(--accent); }
.save-settings-btn { width: calc(100% - 24px); margin: 0 12px; background: var(--accent); color: #000; border: none; border-radius: var(--radius-sm); padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; }

/* EXERCISE SETTINGS */
.ex-settings-item { border-bottom: 1px solid var(--border); }
.ex-settings-item:last-child { border-bottom: none; }
.ex-settings-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; }
.ex-settings-name { flex: 1; font-size: 15px; font-weight: 500; }
.ex-settings-meta { font-size: 12px; color: var(--text2); }
.ex-settings-chevron { color: var(--text3); font-size: 18px; transition: transform 0.2s; }
.ex-settings-chevron.open { transform: rotate(90deg); }
.delete-btn { background: none; border: none; color: var(--danger); font-size: 22px; cursor: pointer; padding: 2px 6px; line-height: 1; }
.ex-edit-form { display: none; padding: 0 14px 14px; background: var(--surface2); }
.ex-edit-form.open { display: block; }
.edit-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.edit-label { font-size: 12px; color: var(--text3); min-width: 80px; text-transform: uppercase; letter-spacing: 0.04em; }
.edit-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 14px; color: var(--text); outline: none; font-family: inherit; }
.edit-input:focus { border-color: var(--accent); }
.save-ex-btn { width: 100%; background: var(--accent-dim); border: 1px solid var(--accent-border); border-radius: var(--radius-sm); padding: 10px; font-size: 14px; font-weight: 600; color: var(--accent); cursor: pointer; }

/* ADD EXERCISE */
.add-ex-form { margin: 0 12px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px; }
.add-ex-form input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 12px; font-size: 14px; color: var(--text); outline: none; margin-bottom: 8px; font-family: inherit; }
.add-ex-form input:focus { border-color: var(--accent); }
.add-ex-form-row { display: flex; gap: 8px; }
.add-ex-btn { flex: 1; background: var(--accent); color: #000; border: none; border-radius: var(--radius-sm); padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }

/* EXPORT */
.export-btn { width: calc(100% - 24px); margin: 0 12px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px; font-size: 14px; font-weight: 600; color: var(--text2); cursor: pointer; }

/* TOAST */
.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 10px 22px; border-radius: 20px; font-size: 14px; font-weight: 700; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-btn active" onclick="switchView('today')">Today</button>
  <button class="nav-btn" onclick="switchView('history')">History</button>
  <button class="nav-btn" onclick="switchView('settings')">Settings</button>
</nav>

<!-- TODAY -->
<div class="view active" id="view-today">
  <div class="page-header">
    <div class="page-title" id="today-day"></div>
    <div class="page-sub" id="today-date"></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-top">
      <span class="progress-label" id="prog-label">0 of 0 done</span>
      <span class="progress-pct" id="prog-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="section-head">Strength</div>
  <div id="ex-list"></div>
  <div class="section-head">Cardio</div>
  <div id="cardio-area"></div>
  <div class="section-head">Session notes</div>
  <div class="session-notes-wrap">
    <textarea class="session-notes-input" id="session-notes" placeholder="Insert session notes here" onblur="saveSessionNote()"></textarea>
  </div>
  <div class="bottom-btn-row">
    <button class="action-btn primary" onclick="saveHistory()">Save session</button>
    <button class="action-btn danger" onclick="resetSession()">Reset</button>
  </div>
</div>

<!-- HISTORY -->
<div class="view" id="view-history" style="display:none">
  <div class="page-header"><div class="page-title">History</div></div>
  <div class="history-list" id="history-list"></div>
</div>

<!-- SETTINGS -->
<div class="view" id="view-settings" style="display:none">
  <div class="page-header"><div class="page-title">Settings</div></div>

  <div class="section-head">Cardio defaults</div>
  <div class="settings-section">
    <div class="settings-card">
      <div class="settings-row">
        <div class="settings-row-info"><div class="settings-row-label">Duration (min)</div></div>
        <input class="settings-input" type="number" id="s-duration" value="30">
      </div>
      <div class="settings-row">
        <div class="settings-row-info"><div class="settings-row-label">Speed (km/h)</div></div>
        <input class="settings-input" type="number" step="0.1" id="s-speed" value="6.5">
      </div>
      <div class="settings-row">
        <div class="settings-row-info"><div class="settings-row-label">Incline (%)</div></div>
        <input class="settings-input" type="number" step="0.5" id="s-incline" value="0">
      </div>
    </div>
  </div>

  <div class="section-head">Default sets & reps</div>
  <div class="settings-section">
    <div class="settings-card">
      <div class="settings-row">
        <div class="settings-row-info">
          <div class="settings-row-label">Sets</div>
          <div class="settings-row-sub">Applied to all exercises unless overridden</div>
        </div>
        <input class="settings-input" type="number" id="s-sets" value="3" min="1" max="10">
      </div>
      <div class="settings-row">
        <div class="settings-row-info"><div class="settings-row-label">Reps per set</div></div>
        <input class="settings-input" type="number" id="s-reps" value="12" min="1" max="30">
      </div>
    </div>
  </div>
  <button class="save-settings-btn" onclick="saveSettings()" style="margin-bottom:20px">Save settings</button>

  <div class="section-head">Exercises</div>
  <div class="settings-section">
    <div class="settings-card" id="ex-settings-list"></div>
  </div>

  <div class="section-head">Add exercise</div>
  <div class="add-ex-form" style="margin-bottom:20px">
    <input type="text" id="new-ex-name" placeholder="Exercise name (e.g. Leg press)">
    <input type="text" id="new-ex-weight" placeholder="Starting weight (e.g. 63kg)">
    <div class="add-ex-form-row">
      <button class="add-ex-btn" onclick="addExercise()">+ Add exercise</button>
    </div>
  </div>

  <div class="section-head">Export</div>
  <div class="settings-section" style="margin-top:0">
    <button class="export-btn" onclick="exportData()">📋 Copy data to clipboard</button>
  </div>
</div>

<!-- BOTTOM SHEET -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheet-title">Log set</div>
  <div class="sheet-section">
    <div class="sheet-label">Weight used</div>
    <input class="sheet-weight-input" type="text" id="sheet-weight" placeholder="e.g. 23kg">
  </div>
  <div class="sheet-section">
    <div class="sheet-label" id="sheet-reps-label">Reps completed</div>
    <div class="reps-grid" id="reps-grid"></div>
  </div>
  <button class="sheet-confirm-btn" onclick="confirmSet()">Log set</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const DEFAULT_EXERCISES = [
  { id:'legpress',     name:'Leg press',      weight:'63kg',     prev:'—' },
  { id:'legcurl',      name:'Leg curl',        weight:'18kg+5lb', prev:'—' },
  { id:'legext',       name:'Leg extension',   weight:'23kg',     prev:'—' },
  { id:'shoulderpress',name:'Shoulder press',  weight:'9kg+5lb',  prev:'—' },
  { id:'bicepscurl',   name:'Biceps curl',     weight:'14kg',     prev:'—' },
  { id:'chestpress',   name:'Chest press',     weight:'23kg',     prev:'—' },
  { id:'seatedrow',    name:'Seated row',      weight:'18kg+5lb', prev:'—' },
  { id:'latpulldown',  name:'Lat pulldown',    weight:'18kg+5lb', prev:'—' },
  { id:'tricepspress', name:'Triceps press',   weight:'36kg+5lb', prev:'—' },
  { id:'abdominal',    name:'Abdominal',       weight:'32kg',     prev:'—' },
];
const DEFAULT_SETTINGS = { duration:30, speed:6.5, incline:0, sets:3, reps:12 };

function ld(k,d){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch{ return d; } }
function sv(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} }

let exercises = ld('wt_ex', DEFAULT_EXERCISES);
let session   = ld('wt_sess', {});
let settings  = ld('wt_cfg', DEFAULT_SETTINGS);
let history   = ld('wt_hist', []);

// ── HELPERS ───────────────────────────────────────────────────────────────────
function exSets(ex){ return ex.sets || settings.sets; }
function exReps(ex){ return ex.reps || settings.reps; }

function getSetData(exId){
  // returns array of {reps, weight, status:'done'|'failed'|null}
  const sets = [];
  const n = exSets(exercises.find(e=>e.id===exId));
  for(let i=0;i<n;i++){
    sets.push(session[exId+'_set_'+i] || null);
  }
  return sets;
}

function allSetsDone(ex){
  const sets = getSetData(ex.id);
  return sets.every(s => s !== null);
}

function setsCompletedCount(ex){
  return getSetData(ex.id).filter(s=>s!==null).length;
}

// ── VIEWS ─────────────────────────────────────────────────────────────────────
function switchView(v){
  ['today','history','settings'].forEach((n,i)=>{
    document.getElementById('view-'+n).style.display = n===v?'block':'none';
    document.querySelectorAll('.nav-btn')[i].classList.toggle('active', n===v);
  });
  if(v==='today')    renderToday();
  if(v==='history')  renderHistory();
  if(v==='settings') renderSettings();
}

// ── TODAY ─────────────────────────────────────────────────────────────────────
function renderToday(){
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('today-day').textContent = days[now.getDay()];
  document.getElementById('today-date').textContent = now.getDate()+' '+months[now.getMonth()];

  // Cardio
  document.getElementById('cardio-area').innerHTML = renderCardioCard();

  // Exercises
  document.getElementById('ex-list').innerHTML = exercises.map(ex => renderExCard(ex)).join('');

  // Session notes
  document.getElementById('session-notes').value = session.notes || '';

  updateProgress();
}

function renderExCard(ex){
  const open = session[ex.id+'_open'];
  const sets = getSetData(ex.id);
  const n = exSets(ex);
  const targetReps = exReps(ex);
  const done = allSetsDone(ex);
  const completed = setsCompletedCount(ex);
  const currentWeight = session[ex.id+'_weight'] || ex.weight;

  // Set circles
  let circles = '';
  for(let i=0;i<n;i++){
    const s = sets[i];
    const isNext = !s && i===completed;
    let cls = 'set-circle';
    let repsLabel = targetReps;
    let numLabel = 'Set '+(i+1);
    if(s){
      cls += s.status==='failed' ? ' failed' : ' done';
      repsLabel = s.reps;
    } else if(isNext){
      cls += ' next';
    }
    circles += `<div class="${cls}" onclick="handleSetTap('${ex.id}',${i})" style="aspect-ratio:1;min-height:60px">
      <span class="set-num">${numLabel}</span>
      <span class="set-reps">${repsLabel}</span>
    </div>`;
  }

  // Sets summary text
  const setsSummary = sets.filter(s=>s).map((s,i)=>{
    if(!s) return null;
    const w = s.weight || currentWeight;
    return w+'×'+s.reps+(s.status==='failed'?'✗':'');
  }).filter(Boolean).join(' → ') || (completed+'/'+n+' sets');

  return `<div class="ex-card ${done?'all-done':''}" id="card-${ex.id}">
    <div class="ex-header" onclick="toggleEx('${ex.id}')">
      <div class="ex-title-block">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-subtitle">${n} sets · ${targetReps} reps</div>
      </div>
      <div class="ex-summary">
        <div class="ex-weight-label">${currentWeight}</div>
        ${ex.prev && ex.prev !== '—' ? `<div class="ex-sets-summary">prev: ${ex.prev}</div>` : ''}
        <div class="ex-sets-summary">${setsSummary}</div>
      </div>
      <span class="ex-chevron ${open?'open':''}">›</span>
    </div>
    <div class="ex-detail ${open?'open':''}">
      <div class="sets-area">
        <div class="sets-row">${circles}</div>
        <div class="sets-btn-row">
          <button class="complete-all-btn" onclick="completeAllSets('${ex.id}')">Complete all sets</button>
          ${completed>0?`<button class="undo-btn" onclick="undoLastSet('${ex.id}')">Undo</button>`:''}
        </div>
      </div>
      <div class="ex-bottom">
        <div class="ex-bottom-row">
          <input class="log-input" id="w_${ex.id}" placeholder="Change weight (e.g. 25kg)" type="text">
          <button class="log-btn" onclick="logWeight('${ex.id}')">Set</button>
        </div>
        <div class="note-area">
          <div class="note-label-sm">Notes</div>
          <textarea class="note-input" id="note_${ex.id}" placeholder="Insert notes here" onblur="saveNote('${ex.id}')">${session[ex.id+'_note']||''}</textarea>
        </div>
      </div>
    </div>
  </div>`;
}

function updateProgress(){
  const total = exercises.length + 1;
  let done = (session.cardio_segs && session.cardio_segs.length > 0) ? 1 : 0;
  exercises.forEach(ex => { if(allSetsDone(ex)) done++; });
  const pct = total>0 ? Math.round((done/total)*100) : 0;
  document.getElementById('prog-label').textContent = done+' of '+total+' done';
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-fill').style.width = pct+'%';
}

function renderCardioCard(){
  const segs = session.cardio_segs || [];
  const hasSegs = segs.length > 0;
  const totalMins = segs.reduce((a,s)=>a+parseFloat(s.duration||0),0);
  const segHTML = hasSegs ? `
    <div class="cardio-segments">
      ${segs.map((s,i)=>`
        <div class="cardio-segment">
          <div class="cardio-segment-info">
            <div>${s.duration} min @ ${s.speed} km/h</div>
            ${s.incline>0?`<div class="cardio-segment-sub">${s.incline}% incline</div>`:''}
          </div>
          <button class="cardio-segment-del" onclick="deleteCardioSeg(${i})">×</button>
        </div>`).join('')}
    </div>
    <div class="cardio-total">Total: ${totalMins} min</div>` : '';
  return `<div class="cardio-card ${hasSegs?'has-segments':''}">
    <div class="cardio-top">
      <div class="cardio-icon">🏃</div>
      <div class="cardio-info">
        <div class="cardio-name">Treadmill</div>
        <div class="cardio-detail">${hasSegs ? totalMins+' min logged' : 'No segments yet'}</div>
      </div>
      <button class="cardio-add-btn" onclick="openCardioSheet()">+ Add</button>
    </div>
    ${segHTML}
  </div>`;
}

function openCardioSheet(){
  document.getElementById('sheet-title').textContent = 'Log cardio segment';
  document.getElementById('sheet').dataset.mode = 'cardio';
  document.getElementById('reps-grid').innerHTML = '';
  document.getElementById('sheet-reps-label').textContent = '';
  // Build cardio inputs inside sheet-section weight area
  document.querySelector('.sheet-section').innerHTML = `
    <div class="cardio-inputs">
      <div class="cardio-input-group">
        <div class="cardio-input-label">Duration (min)</div>
        <input class="cardio-sheet-input" id="cseg-duration" type="number" placeholder="10" value="">
      </div>
      <div class="cardio-input-group">
        <div class="cardio-input-label">Speed (km/h)</div>
        <input class="cardio-sheet-input" id="cseg-speed" type="number" step="0.1" placeholder="${settings.speed}" value="${settings.speed}">
      </div>
      <div class="cardio-input-group">
        <div class="cardio-input-label">Incline (%)</div>
        <input class="cardio-sheet-input" id="cseg-incline" type="number" step="0.5" placeholder="0" value="${settings.incline||0}">
      </div>
    </div>`;
  document.getElementById('sheet-confirm-btn').textContent = 'Add segment';
  document.getElementById('sheet-overlay').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}

function deleteCardioSeg(i){
  const segs = session.cardio_segs || [];
  segs.splice(i,1);
  session.cardio_segs = segs;
  sv('wt_sess',session);
  renderToday();
}

function toggleEx(id){
  session[id+'_open'] = !session[id+'_open'];
  sv('wt_sess',session);
  renderToday();
}

function logWeight(id){
  const el = document.getElementById('w_'+id);
  if(!el||!el.value.trim()) return;
  session[id+'_weight'] = el.value.trim();
  sv('wt_sess',session);
  showToast('Weight updated');
  renderToday();
}

function saveNote(id){
  const el = document.getElementById('note_'+id);
  if(el){ session[id+'_note']=el.value; sv('wt_sess',session); }
}

function saveSessionNote(){
  session.notes = document.getElementById('session-notes').value;
  sv('wt_sess',session);
}

function completeAllSets(exId){
  const ex = exercises.find(e=>e.id===exId);
  const n = exSets(ex);
  const w = session[exId+'_weight'] || ex.weight;
  for(let i=0;i<n;i++){
    session[exId+'_set_'+i] = { reps: exReps(ex), weight: w, status:'done' };
  }
  sv('wt_sess',session);
  renderToday();
}

function undoLastSet(exId){
  const ex = exercises.find(e=>e.id===exId);
  const n = exSets(ex);
  for(let i=n-1;i>=0;i--){
    if(session[exId+'_set_'+i]){
      session[exId+'_set_'+i] = null;
      sv('wt_sess',session);
      renderToday();
      return;
    }
  }
}

// ── BOTTOM SHEET ──────────────────────────────────────────────────────────────
let sheetCtx = null; // {exId, setIndex}
let selectedReps = null;

function handleSetTap(exId, setIndex){
  const ex = exercises.find(e=>e.id===exId);
  const sets = getSetData(exId);
  const completed = setsCompletedCount(ex);

  // Only allow tapping the next set in sequence, or re-tapping a done set
  if(setIndex > completed) return;

  sheetCtx = {exId, setIndex};
  selectedReps = exReps(ex);

  const currentWeight = session[exId+'_weight'] || ex.weight;
  const existing = sets[setIndex];

  document.getElementById('sheet-title').textContent = ex.name+' — Set '+(setIndex+1);
  document.getElementById('sheet-weight').value = existing ? existing.weight : currentWeight;

  const targetReps = exReps(ex);
  document.getElementById('sheet-reps-label').textContent = 'Reps completed (target: '+targetReps+')';

  // Build reps grid: 1 to targetReps, with targetReps highlighted
  let grid = '';
  for(let r=1;r<=targetReps;r++){
    const isTarget = r===targetReps;
    const isSel = existing ? r===existing.reps : isTarget;
    if(isSel) selectedReps = r;
    grid += `<button class="rep-btn ${isTarget?'target':''} ${isSel?'selected':''}" onclick="selectRep(${r},${targetReps})">${r}</button>`;
  }
  document.getElementById('reps-grid').innerHTML = grid;

  document.getElementById('sheet-overlay').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}

function selectRep(r, target){
  selectedReps = r;
  document.querySelectorAll('.rep-btn').forEach(btn=>{
    const isTarget = parseInt(btn.textContent)===target;
    btn.className = 'rep-btn'+(isTarget?' target':'')+(parseInt(btn.textContent)===r?' selected':'');
  });
}

function confirmSet(){
  const mode = document.getElementById('sheet').dataset.mode;
  if(mode === 'cardio'){
    const duration = parseFloat(document.getElementById('cseg-duration').value);
    const speed = parseFloat(document.getElementById('cseg-speed').value);
    const incline = parseFloat(document.getElementById('cseg-incline').value)||0;
    if(!duration||!speed){ showToast('Enter duration and speed'); return; }
    const segs = session.cardio_segs || [];
    segs.push({ duration, speed, incline });
    session.cardio_segs = segs;
    sv('wt_sess',session);
    closeSheet();
    // Restore sheet for exercise use
    document.querySelector('.sheet-section').innerHTML = `<div class="sheet-label">Weight used</div><input class="sheet-weight-input" type="text" id="sheet-weight" placeholder="e.g. 23kg">`;
    document.getElementById('sheet-confirm-btn').textContent = 'Log set';
    renderToday();
    return;
  }
  if(!sheetCtx) return;
  const {exId, setIndex} = sheetCtx;
  const ex = exercises.find(e=>e.id===exId);
  const w = document.getElementById('sheet-weight').value.trim() || session[exId+'_weight'] || ex.weight;
  const r = selectedReps || exReps(ex);
  const status = r < exReps(ex) ? 'failed' : 'done';
  session[exId+'_set_'+setIndex] = { reps: r, weight: w, status };
  sv('wt_sess',session);
  closeSheet();
  renderToday();
}

function closeSheet(){
  document.getElementById('sheet-overlay').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
  sheetCtx = null;
}

// ── SAVE / RESET ──────────────────────────────────────────────────────────────
function saveHistory(){
  const now = new Date();
  const label = now.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  const entry = { date: label, notes: session.notes||'', cardio: null, exercises:[] };
  const segs = session.cardio_segs || [];
  if(segs.length) entry.cardio = segs.map(s=>s.duration+'min @ '+s.speed+'km/h'+(s.incline>0?' ('+s.incline+'% incline)':'')).join(' → ');
  exercises.forEach(ex=>{
    const sets = getSetData(ex.id).filter(Boolean);
    const w = session[ex.id+'_weight'] || ex.weight;
    entry.exercises.push({ name:ex.name, weight:w, sets, note:session[ex.id+'_note']||'' });
    // Update prev weights
    if(sets.length){ ex.prev = ex.weight; ex.weight = w; }
  });
  history.unshift(entry);
  if(history.length>60) history=history.slice(0,60);
  sv('wt_hist',history);
  sv('wt_ex',exercises);
  showToast('Session saved ✓');
}

function resetSession(){
  if(!confirm('Reset today\'s session?')) return;
  session = {};
  sv('wt_sess',session);
  renderToday();
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function renderHistory(){
  if(!history.length){
    document.getElementById('history-list').innerHTML='<div class="empty-state">No sessions yet.<br>Complete a workout and tap <strong>Save session</strong>.</div>';
    return;
  }
  document.getElementById('history-list').innerHTML = history.map(h=>{
    let rows = '';
    if(h.cardio) rows+=`<div class="history-row"><span class="history-ex-name">Cardio</span><span class="history-sets">${h.cardio}</span></div>`;
    h.exercises.forEach(ex=>{
      const setsStr = ex.sets && ex.sets.length ? ex.sets.map(s=>s.weight+'×'+s.reps+(s.status==='failed'?'✗':'')).join(' → ') : ex.weight;
      rows+=`<div class="history-row"><span class="history-ex-name">${ex.name}</span><span class="history-sets">${setsStr}</span></div>`;
    });
    return `<div class="history-item">
      <div class="history-date">${h.date}</div>
      ${h.notes?`<div class="history-note">"${h.notes}"</div>`:''}
      ${rows}
    </div>`;
  }).join('');
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function renderSettings(){
  document.getElementById('s-duration').value = settings.duration;
  document.getElementById('s-speed').value = settings.speed;
  document.getElementById('s-incline').value = settings.incline;
  document.getElementById('s-sets').value = settings.sets;
  document.getElementById('s-reps').value = settings.reps;

  document.getElementById('ex-settings-list').innerHTML = exercises.map((ex,i)=>{
    const open = ex._editOpen;
    return `<div class="ex-settings-item">
      <div class="ex-settings-row" onclick="toggleExEdit(${i})">
        <div class="ex-settings-name">${ex.name}</div>
        <div class="ex-settings-meta">${exSets(ex)}×${exReps(ex)} · ${ex.weight}</div>
        <span class="ex-settings-chevron ${open?'open':''}">›</span>
        <button class="delete-btn" onclick="event.stopPropagation();deleteEx(${i})">×</button>
      </div>
      <div class="ex-edit-form ${open?'open':''}">
        <div class="edit-row">
          <span class="edit-label">Name</span>
          <input class="edit-input" id="ei-name-${i}" value="${ex.name}" placeholder="Exercise name">
        </div>
        <div class="edit-row">
          <span class="edit-label">Weight</span>
          <input class="edit-input" id="ei-weight-${i}" value="${ex.weight}" placeholder="e.g. 23kg">
        </div>
        <div class="edit-row">
          <span class="edit-label">Sets</span>
          <input class="edit-input" id="ei-sets-${i}" type="number" value="${ex.sets||''}" placeholder="Default (${settings.sets})">
        </div>
        <div class="edit-row">
          <span class="edit-label">Reps</span>
          <input class="edit-input" id="ei-reps-${i}" type="number" value="${ex.reps||''}" placeholder="Default (${settings.reps})">
        </div>
        <button class="save-ex-btn" onclick="saveExEdit(${i})">Save changes</button>
      </div>
    </div>`;
  }).join('');
}

function toggleExEdit(i){
  exercises[i]._editOpen = !exercises[i]._editOpen;
  renderSettings();
}

function saveExEdit(i){
  const name = document.getElementById('ei-name-'+i).value.trim();
  const weight = document.getElementById('ei-weight-'+i).value.trim();
  const sets = parseInt(document.getElementById('ei-sets-'+i).value)||null;
  const reps = parseInt(document.getElementById('ei-reps-'+i).value)||null;
  if(name) exercises[i].name = name;
  if(weight) exercises[i].weight = weight;
  exercises[i].sets = sets;
  exercises[i].reps = reps;
  exercises[i]._editOpen = false;
  sv('wt_ex',exercises);
  renderSettings();
  showToast('Saved');
}

function saveSettings(){
  settings.duration = parseFloat(document.getElementById('s-duration').value)||30;
  settings.speed    = parseFloat(document.getElementById('s-speed').value)||6.5;
  settings.incline  = parseFloat(document.getElementById('s-incline').value)||0;
  settings.sets     = parseInt(document.getElementById('s-sets').value)||3;
  settings.reps     = parseInt(document.getElementById('s-reps').value)||12;
  sv('wt_cfg',settings);
  showToast('Settings saved');
}

function addExercise(){
  const name = document.getElementById('new-ex-name').value.trim();
  const weight = document.getElementById('new-ex-weight').value.trim();
  if(!name){ showToast('Enter a name'); return; }
  const id = name.toLowerCase().replace(/[^a-z0-9]/g,'')+'_'+Date.now();
  exercises.push({ id, name, weight:weight||'—', prev:'—' });
  sv('wt_ex',exercises);
  document.getElementById('new-ex-name').value='';
  document.getElementById('new-ex-weight').value='';
  renderSettings();
  showToast('Exercise added');
}

function deleteEx(i){
  if(!confirm('Delete "'+exercises[i].name+'"?')) return;
  exercises.splice(i,1);
  sv('wt_ex',exercises);
  renderSettings();
  showToast('Removed');
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportData(){
  let out = '=== WORKOUT EXPORT ===\n\n';
  out += '--- CURRENT EXERCISES ---\n';
  exercises.forEach(ex=>{
    out += `${ex.name}: ${ex.weight} (prev: ${ex.prev||'—'}) | ${exSets(ex)}×${exReps(ex)}\n`;
  });
  out += '\n--- HISTORY (last 10 sessions) ---\n';
  history.slice(0,10).forEach(h=>{
    out += `\n${h.date}\n`;
    if(h.notes) out += `Note: ${h.notes}\n`;
    if(h.cardio) out += `Cardio: ${h.cardio}\n`;
    h.exercises.forEach(ex=>{
      const sets = ex.sets&&ex.sets.length ? ex.sets.map(s=>s.weight+'×'+s.reps+(s.status==='failed'?'(fail)':'')).join(', ') : ex.weight;
      out += `${ex.name}: ${sets}${ex.note?' ['+ex.note+']':''}\n`;
    });
  });
  navigator.clipboard.writeText(out).then(()=>showToast('Copied!')).catch(()=>showToast('Copy failed'));
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderToday();
</script>
</body>
</html>
